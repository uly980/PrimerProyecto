<div *ngIf = "display" class="card" style="width: 50rem;" id="divpadre">
  <div class="row g-0" >
    <div class="col-5">
      <div class="card-body">
        <h5 class="card-title mb-1" id="titulo">{{reporteRecetas.nombrereceta}}</h5>
        <p class="card-text text-muted mb-2" style="font-size: 0.9rem;">Ingredientes: {{reporteRecetas.ingredientes}}</p>
        <p class="card-text text-muted mb-3">Descripción: {{reporteRecetas.descripcion}}</p>
        <qrcode [qrdata]="reporteRecetas.nombrereceta" [width]="128" [errorCorrectionLevel]="'M'"></qrcode>
        <p class="list-group-item">Tiempo de elaboración: {{reporteRecetas.tiempo}} minutos</p>
        <p class="list-group-item">Porciones: {{reporteRecetas.porciones}} porciones</p>
      </div>
    </div>
    <div class="col-7">
      <img class="img-fluid rounded-start" id="img1" src="{{reporteRecetas.imagenURL}}" alt="Card image cap" style="object-fit: cover; width: 100%; height: 100%;">
    </div>
  </div>
</div>
<div class="text-center mt-3">
  <button class="btn btn-info" (click)="sellar()"> <img src="https://cdn-icons-png.flaticon.com/512/2910/2910787.png" class="img"> <br> Sellar</button>
</div>
